<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FixLab Admin Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">

</head>
<body>



<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <h2>🔧 FixLab</h2>
        </div>

        <ul class="menu">

            <li class="active">🏠 Dashboard</li>

            <li>📱 Bookings</li>

            <li>👥 Customers</li>

            <li>⚙ Settings</li>

        </ul>

        <button id="logoutBtn">
            🚪 Logout
        </button>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <header>

            <h1>Admin Dashboard</h1>

            <p>Welcome back, Admin 👋</p>

        </header>

        <!-- Statistics -->
        <section class="stats">

            <div class="card">

                <h3>Total Bookings</h3>

                <h2 id="totalBookings">0</h2>

            </div>

            <div class="card">

                <h3>Pending</h3>

                <h2 id="pendingBookings">0</h2>

            </div>

            <div class="card">

                <h3>In Progress</h3>

                <h2 id="progressBookings">0</h2>

            </div>

            <div class="card">

                <h3>Completed</h3>

                <h2 id="completedBookings">0</h2>

            </div>

        </section>

        <!-- Search -->
        <section class="search-section">

            <input
                type="text"
                id="searchInput"
                placeholder="Search customer..."
            >

        </section>

        <!-- Table -->
        <section class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>Name</th>

                        <th>Email</th>

                        <th>Phone</th>

                        <th>Repair</th>

                        <th>Brand</th>

                        <th>Problem</th>

                        <th>Status</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="bookingTableBody">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="dashboard.js"></script>

</body>
</html>
