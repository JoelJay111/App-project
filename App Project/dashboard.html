<!DOCTYPE html>
<html lang="en">
<head>

     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FixLab</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

  <!-- DASHBOARD -->
  <section class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <h2>FixLab</h2>

      <ul>

        <li>Dashboard</li>

        <li>Bookings</li>

        <li>Customers</li>

        <li>Settings</li>

      </ul>

    </div>

    <!-- MAIN CONTENT -->
    <div class="dashboard-content">

      <h1>Repair Bookings</h1>

      <!-- BOOKINGS TABLE -->
      <table>

        <thead>

          <tr>

            <th>Name</th>

            <th>Phone</th>

            <th>Repair</th>

            <th>Brand</th>

          </tr>

        </thead>

        <tbody id="bookingTableBody">

        </tbody>

      </table>

    </div>

  </section>

  <script src="app.js"></script>

</body>
</html>
